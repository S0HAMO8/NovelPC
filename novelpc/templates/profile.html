{% extends "base.html" %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="page-header">
  <h1>👤 My <span class="accent">Profile</span></h1>
</div>

<div class="auth-wrap">
  <div class="auth-card profile-card">
    <div class="form-group">
      <label>Username</label>
      <input type="text" value="{{ user.username }}" disabled>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" value="{{ user.email }}" disabled>
    </div>
    <form method="POST" action="{{ url_for('profile') }}">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" value="{{ user.phone or '' }}" placeholder="+91 98765 43210">
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" name="address" value="{{ user.address or '' }}" placeholder="Shipping address">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Save Changes</button>
    </form>
    <p class="auth-footer">Member since {{ user.created_at.strftime('%d %b %Y') }}</p>
  </div>
</div>
{% endblock %}
