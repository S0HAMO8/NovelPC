{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🔒</div>
    <h2>Reset Password</h2>
    <p class="auth-sub">Enter your new password below</p>
    <form method="POST" action="{{ url_for('reset_password', token=token) }}">
      <div class="form-group">
        <label>New Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="password-field" placeholder="New password" required>
          <button type="button" class="toggle-password" onclick="togglePassword('password-field', this)" aria-label="Show password">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Reset Password →</button>
    </form>
  </div>
</div>

<script>
function togglePassword(fieldId, btn) {
  const field = document.getElementById(fieldId);
  if (field.type === 'password') {
    field.type = 'text';
    btn.textContent = '🙈';
  } else {
    field.type = 'password';
    btn.textContent = '👁️';
  }
}
</script>
{% endblock %}
