{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🎮</div>
    <h2>Create Account</h2>
    <p class="auth-sub">Join novelPC and start building</p>
    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="password-field" placeholder="Create a password" required autocomplete="new-password">
          <button type="button" class="toggle-password" onclick="togglePassword('password-field', this)" aria-label="Show password">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="+91 98765 43210" required id="phone-field">
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" name="address" placeholder="Shipping address" required id="address-field">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
  </div>
</div>

<script>
function togglePassword(fieldId, btn) {
  const field = document.getElementById(fieldId);
  if (field.type === 'password') {
    field.type = 'text';
    btn.textContent = '🙈';
  } else {
    field.type = 'password';
    btn.textContent = '👁️';
  }
}

// Validate all fields are filled before submitting
document.querySelector('form').addEventListener('submit', function (e) {
  const fields = [
    { id: 'username',       label: 'Username' },
    { id: 'email',          label: 'Email' },
    { id: 'password-field', label: 'Password' },
    { id: 'phone-field',    label: 'Phone Number' },
    { id: 'address-field',  label: 'Address' },
  ];

  // Use name attribute for username/email since they have no id
  const form = this;
  const getValue = (id) => {
    const el = document.getElementById(id) || form.querySelector(`[name="${id}"]`);
    return el ? el.value.trim() : '';
  };

  for (const field of fields) {
    if (!getValue(field.id)) {
      e.preventDefault();
      alert(`Please fill in your ${field.label} before creating an account.`);
      const el = document.getElementById(field.id) || form.querySelector(`[name="${field.id}"]`);
      if (el) el.focus();
      return;
    }
  }
});
</script>
{% endblock %}
