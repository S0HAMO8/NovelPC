{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">⚡</div>
    <h2>Welcome Back</h2>
    <p class="auth-sub">Log in to start building your rig</p>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Your username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="password-field" placeholder="Your password" required autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="togglePassword('password-field', this)" aria-label="Show password">👁️</button>
        </div>
      </div>
      <div class="forgot-link"><a href="{{ url_for('forgot_password') }}">Forgot password?</a></div>
      <button type="submit" class="btn btn-primary btn-full">Login →</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
  </div>
</div>

<script>
function togglePassword(fieldId, btn) {
  const field = document.getElementById(fieldId);
  if (field.type === 'password') {
    field.type = 'text';
    btn.textContent = '🙈';
  } else {
    field.type = 'password';
    btn.textContent = '👁️';
  }
}
</script>
{% endblock %}
